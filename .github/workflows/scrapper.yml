name: Petrol prices scrapper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Pull repository
        uses: actions/checkout@v4

      - name: Create Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libs
        run: pip install requests beautifulsoup4

      - name: Run scrapper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py

      - name: Save state to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_found.txt
          # Commit zostanie wykonany tylko wtedy, gdy zawartość pliku się zmieniła
          git diff --quiet && git diff --staged --quiet || (git commit -m "Zaktualizowano datę pobrania cen" && git push)